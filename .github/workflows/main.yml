name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Pre-Clean Conflicting Configurations
        run: |
          # حذف مجلد أندرويد القديم فقط لضمان بناء نظيف، مع الحفاظ على ملفات الإعدادات الأصلية القادمة من الـ zip
          rm -rf android

      - name: Unzip Project Files
        run: |
          unzip "pos.zip--صيدلي-برو" -d temp_unzip || unzip *.zip -d temp_unzip || true
          TARGET_DIR=$(find temp_unzip -name "package.json" -exec dirname {} \;)
          if [ -n "$TARGET_DIR" ]; then
            echo "Found project files in: $TARGET_DIR"
            cp -r "$TARGET_DIR"/* .
          else
            echo "Error: package.json not found!"
            exit 1
          fi
          rm -rf temp_unzip

      - name: Auto-Patch React Code for Capacitor Share & Filesystem (via Node)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          function findTargetFile(dir, words) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                const found = findTargetFile(fullPath, words);
                if (found) return found;
              } else if (stat.isFile() && /\.(js|jsx|ts|tsx)$/.test(file)) {
                const content = fs.readFileSync(fullPath, 'utf8');
                if (words.some(word => content.includes(word))) {
                  return fullPath;
                }
              }
            }
            return null;
          }

          const targetFile = findTargetFile('src', ['تم تصدير', 'تصدير ومشاركة', 'download']);

          if (targetFile) {
            console.log('Found Target File:', targetFile);
            let content = fs.readFileSync(targetFile, 'utf8');

            const imports = 'import { Filesystem, Directory } from \"@capacitor/filesystem\";\nimport { Share } from \"@capacitor/share\";\nimport { Capacitor } from \"@capacitor/core\";\n';
            content = imports + content;

            const patchCode = [
              '',
              'window.handleCapacitorShare = async (blobOrUrl, fallbackFileName) => {',
              '  try {',
              '    const fileName = fallbackFileName || (\"Saydali_Pro_Backup_\" + Date.now() + \".zip\");',
              '    let base64Data = \"\";',
              '    if (typeof blobOrUrl === \"string\" && blobOrUrl.startsWith(\"data:\")) {',
              '      base64Data = blobOrUrl.split(\",\")[1];',
              '    } else {',
              '      const response = await fetch(blobOrUrl);',
              '      const blob = await response.blob();',
              '      base64Data = await new Promise((resolve) => {',
              '        const reader = new FileReader();',
              '        reader.onloadend = () => resolve(reader.result.split(\",\")[1]);',
              '        reader.readAsDataURL(blob);',
              '      });',
              '    }',
              '    if (Capacitor.isNativePlatform()) {',
              '      await Filesystem.requestPermissions();',
              '      const tempFile = await Filesystem.writeFile({',
              '        path: fileName,',
              '        data: base64Data,',
              '        directory: Directory.Cache',
              '      });',
              '      const canShare = await Share.canShare();',
              '      if (canShare.value) {',
              '        await Share.share({',
              '          title: \"نسخة احتياطية - صيدلي برو\",',
              '          text: \"ملف النسخة الاحتياطية لقاعدة البيانات.\",',
              '          url: tempFile.uri,',
              '          dialogTitle: \"تصدير ومشاركة النسخة الاحتياطية\"',
              '        });',
              '      } else {',
              '        await Filesystem.writeFile({',
              '          path: fileName,',
              '          data: base64Data,',
              '          directory: Directory.Documents',
              '        });',
              '        alert(\"تم حفظ الملف في مجلد المستندات Documents بنجاح!\");',
              '      }',
              '    } else {',
              '      const link = document.createElement(\"a\");',
              '      link.href = \"data:application/zip;base64,\" + base64Data;',
              '      link.download = fileName;',
              '      document.body.appendChild(link);',
              '      link.click();',
              '      document.body.removeChild(link);',
              '    }',
              '  } catch (e) {',
              '    console.error(\"فشلت عملية المشاركة البرمجية:\", e);',
              '  }',
              '};'
            ].join('\n');

            content = content + '\n' + patchCode;

            content = content.replace(/([a-zA-Z0-9_]*)\.click\(\)/g, (match, p1) => {
              return 'if (window.handleCapacitorShare) { window.handleCapacitorShare(' + p1 + '.href || ' + p1 + ', \"Saydali_Pro_Backup.zip\"); } else { ' + match + ' }';
            });

            fs.writeFileSync(targetFile, content, 'utf8');
            console.log('React Code successfully patched!');
          } else {
            console.log('No matching file found to patch.');
          }
          "

      - name: Inject Ultra-Compatible Chrome Bluetooth Emulator (via Node)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          function findEntry(dir) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const full = path.join(dir, file);
              if (fs.statSync(full).isDirectory()) {
                const found = findEntry(full);
                if (found) return found;
              } else if (/\.(tsx|ts|jsx|js)$/.test(file) && (file.startsWith('main') || file.startsWith('index') || file.startsWith('App'))) {
                return full;
              }
            }
            return null;
          }
          
          const entry = findEntry('src');
          if (entry) {
            console.log('Injecting Ultra-Compatible Web Bluetooth Emulator to:', entry);
            let content = fs.readFileSync(entry, 'utf8');
            
            const polyfill = [
              'import { BleClient } from \"@capacitor-community/bluetooth-le\";',
              '',
              '(async () => {',
              '  try {',
              '    await BleClient.initialize({ registerReceiver: true });',
              '    await BleClient.requestEnabled();',
              '  } catch (e) {',
              '    console.error(\"BLE Auto-Init Failed:\", e);',
              '  }',
              '})();',
              '',
              'if (typeof window !== \"undefined\" && !navigator.bluetooth) {',
              '  const formatUUID = (uuid) => {',
              '    if (typeof uuid === \"number\") uuid = uuid.toString(16);',
              '    if (typeof uuid === \"string\") {',
              '      if (uuid.length === 4) return \"0000\" + uuid.toLowerCase() + \"-0000-1000-8000-00805f9b34fb\";',
              '      if (uuid.length === 8) return uuid.toLowerCase() + \"-0000-1000-8000-00805f9b34fb\";',
              '      return uuid.toLowerCase();',
              '    }',
              '    return uuid;',
              '  };',
              '',
              '  navigator.bluetooth = {',
              '    requestDevice: async function (options) {',
              '      try {',
              '        await BleClient.initialize({ registerReceiver: true });',
              '        const device = await BleClient.requestDevice(options);',
              '        ',
              '        const nativeDevice = {',
              '          id: device.deviceId,',
              '          name: device.name || \"R80D-UB-610\",',
              '          gatt: {',
              '            connected: false,',
              '            connect: async function () {',
              '              await BleClient.connect(device.deviceId);',
              '              this.connected = true;',
              '              return this;',
              '            },',
              '            disconnect: async function () {',
              '              await BleClient.disconnect(device.deviceId);',
              '              this.connected = false;',
              '            },',
              '            getPrimaryService: async function (serviceUuid) {',
              '              const sUuid = formatUUID(serviceUuid);',
              '              return {',
              '                uuid: sUuid,',
              '                getCharacteristic: async function (characteristicUuid) {',
              '                  const cUuid = formatUUID(characteristicUuid);',
              '                  return {',
              '                    uuid: cUuid,',
              '                    writeValue: async function (value) {',
              '                      let bufferToSend;',
              '                      if (value instanceof DataView) {',
              '                        bufferToSend = value;',
              '                      } else if (value && value.buffer) {',
              '                        bufferToSend = new DataView(value.buffer);',
              '                      } else {',
              '                        bufferToSend = new DataView(value);',
              '                      }',
              '                      await BleClient.write(device.deviceId, sUuid, cUuid, bufferToSend);',
              '                    },',
              '                    writeValueWithoutResponse: async function (value) {',
              '                      let bufferToSend;',
              '                      if (value instanceof DataView) {',
              '                        bufferToSend = value;',
              '                      } else if (value && value.buffer) {',
              '                        bufferToSend = new DataView(value.buffer);',
              '                      } else {',
              '                        bufferToSend = new DataView(value);',
              '                      }',
              '                      await BleClient.writeWithoutResponse(device.deviceId, sUuid, cUuid, bufferToSend);',
              '                    }',
              '                  };',
              '                },',
              '                getCharacteristics: async function () {',
              '                  return [];',
              '                }',
              '              };',
              '            },',
              '            getPrimaryServices: async function () {',
              '              return [];',
              '            }',
              '          }',
              '        };',
              '        ',
              '        return nativeDevice;',
              '      } catch (err) {',
              '        console.error(\"Bluetooth Emulation Failed:\", err);',
              '        throw err;',
              '      }',
              '    }',
              '  };',
              '}'
            ].join('\n');
            
            content = polyfill + '\n' + content;
            fs.writeFileSync(entry, content, 'utf8');
            console.log('Ultra-Compatible Emulator successfully injected!');
          } else {
            console.log('Entry file not found!');
          }
          "

      - name: Deep Clean Environment
        run: |
          rm -rf node_modules package-lock.json dist android

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Project Dependencies
        run: |
          npm install --force

      - name: Install Capacitor Core & Plugins (Before Build)
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/filesystem@latest @capacitor/share@latest @capacitor-community/bluetooth-le --force

      - name: Build Web Application
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          # كتابة ملف الإعدادات برمجياً بطريقة آمنة بدون الحاجة لـ EOF لتفادي أخطاء المفسر
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.js" ]; then
            echo "Creating capacitor.config.json dynamically..."
            echo "{" > capacitor.config.json
            echo "  \"appId\": \"com.saydalipro.pos\"," >> capacitor.config.json
            echo "  \"appName\": \"Saydali Pro POS\"," >> capacitor.config.json
            echo "  \"webDir\": \"dist\"" >> capacitor.config.json
            echo "}" >> capacitor.config.json
          else
            echo "Capacitor configuration file already exists. Skipping init..."
          fi
          
          # إضافة منصة الأندرويد ومزامنتها
          npx cap add android || true
          npx cap sync android

      - name: Configure FileProvider and Bluetooth Permissions
        run: |
          mkdir -p android/app/src/main/res/xml
          
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > android/app/src/main/res/xml/file_paths.xml
          echo "<paths xmlns:android=\"http://schemas.android.com/apk/res/android\">" >> android/app/src/main/res/xml/file_paths.xml
          echo "    <external-path name=\"external_files\" path=\".\"/>" >> android/app/src/main/res/xml/file_paths.xml
          echo "    <cache-path name=\"cache_files\" path=\".\"/>" >> android/app/src/main/res/xml/file_paths.xml
          echo "    <files-path name=\"files\" path=\".\"/>" >> android/app/src/main/res/xml/file_paths.xml
          echo "</paths>" >> android/app/src/main/res/xml/file_paths.xml

          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            echo "Configuring AndroidManifest with permissions, Bluetooth and FileProvider..."
            
            sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />' $MANIFEST_PATH
            
            PROVIDER_TAG='<provider android:name="androidx.core.content.FileProvider" android:authorities="${applicationId}.fileprovider" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/file_paths" /></provider>'
            sed -i "s|</application>|    $PROVIDER_TAG\n    </application>|" $MANIFEST_PATH
          fi

      - name: Update Kotlin & Gradle Versions for Java 21
        run: |
          cd android
          if [ -f "build.gradle" ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' build.gradle
            sed -i 's/kotlin_version = .*/kotlin_version = "1.9.24"/g' build.gradle
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.project.android.useAndroidX=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saydali-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          overwrite: true
